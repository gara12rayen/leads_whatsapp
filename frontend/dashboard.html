<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tableau de bord — Leads WhatsApp</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* ---- tokens ---- */
      --bg: #0a0d12;
      --bg-elevated: #0d1117;
      --surface: #12161d;
      --surface-2: #171c24;
      --border: #232a35;
      --border-soft: #1b212a;
      --text: #e9ebef;
      --text-muted: #8b93a4;
      --text-faint: #576073;

      --accent: #34c787;
      --accent-soft: rgba(52, 199, 135, 0.12);
      --accent-dim: #1f8d5e;
      --blue: #5b9df0;
      --blue-soft: rgba(91, 157, 240, 0.12);
      --orange: #e8a33d;
      --orange-soft: rgba(232, 163, 61, 0.12);
      --red: #e5484d;
      --red-soft: rgba(229, 72, 77, 0.12);
      --purple: #9d8cff;
      --purple-soft: rgba(157, 140, 255, 0.12);

      --font-ui: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      --font-mono: 'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;

      --radius: 10px;
      --radius-sm: 7px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
    }

    #root { min-height: 100vh; }

    ::selection { background: var(--accent-soft); color: var(--text); }

    a { color: inherit; }

    code { font-family: var(--font-mono); }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    }

    /* ================= layout shell ================= */

    .app {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: var(--bg-elevated);
      border-right: 1px solid var(--border-soft);
      padding: 22px 16px;
      display: flex;
      flex-direction: column;
      gap: 26px;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 8px;
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 13px;
      flex-shrink: 0;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      line-height: 1.25;
    }

    .brand-text strong { font-size: 13.5px; font-weight: 700; }
    .brand-text span { font-size: 11px; color: var(--text-faint); }

    .nav-group { display: flex; flex-direction: column; gap: 2px; }

    .nav-label {
      font-size: 10.5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-faint);
      padding: 6px 10px 4px;
      font-weight: 600;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      color: var(--text-muted);
      border-left: 2px solid transparent;
      cursor: pointer;
      background: none;
      border-top: none;
      border-right: none;
      border-bottom: none;
      width: 100%;
      text-align: left;
      font-family: var(--font-ui);
    }

    .nav-item:hover { color: var(--text); background: var(--surface); }

    .nav-item .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-faint);
      flex-shrink: 0;
    }

    .nav-item.active {
      background: var(--surface-2);
      color: var(--text);
      border-left-color: var(--accent);
    }

    .nav-item.active .dot { background: var(--accent); }

    .sidebar-foot {
      margin-top: auto;
      border-top: 1px solid var(--border-soft);
      padding-top: 14px;
      font-size: 11.5px;
      color: var(--text-faint);
      padding-left: 8px;
      line-height: 1.6;
    }

    .main { padding: 26px 32px 40px; max-width: 1440px; }

    /* ================= topbar ================= */

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .topbar h1 {
      margin: 0 0 4px;
      font-size: 21px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .topbar .sub {
      margin: 0;
      font-size: 13px;
      color: var(--text-muted);
    }

    .topbar .sub.error { color: var(--red); }

    .topbar-actions { display: flex; align-items: center; gap: 10px; }

    .pill {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 7px 12px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pill .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .btn-refresh {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: var(--font-ui);
    }

    .btn-refresh:hover { border-color: var(--text-faint); }
    .btn-refresh:disabled { opacity: 0.5; cursor: default; }

    /* ================= kpi row ================= */

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 16px;
    }

    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      padding: 16px 18px;
    }

    .kpi-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .kpi-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .kpi-value {
      font-family: var(--font-mono);
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      font-variant-numeric: tabular-nums;
    }

    .kpi-delta {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .kpi-delta .arrow { font-size: 10px; }
    .kpi-delta.up { color: var(--accent); }
    .kpi-delta.down { color: var(--red); }

    .sparkline { display: block; opacity: 0.9; }

    /* ================= panels ================= */

    .panel {
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      padding: 18px 20px;
    }

    .panel-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
    }

    .panel-head .hint {
      font-size: 11.5px;
      color: var(--text-faint);
    }

    .charts-row {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .chart-box { position: relative; height: 280px; }
    .chart-box canvas { width: 100% !important; height: 100% !important; }

    .legend-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      margin-top: 12px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .legend-row .item { display: flex; align-items: center; gap: 6px; }
    .legend-row .swatch { width: 8px; height: 8px; border-radius: 2px; }

    /* ================= table ================= */

    .table-wrap { overflow-x: auto; }

    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .table th {
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-faint);
      font-weight: 600;
      padding: 0 12px 10px;
      border-bottom: 1px solid var(--border-soft);
    }

    .table td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--border-soft);
      color: var(--text);
      vertical-align: middle;
    }

    .table tr:last-child td { border-bottom: none; }

    .table .num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; color: var(--text-muted); }

    .lead-name { font-weight: 500; }
    .lead-channel { color: var(--text-muted); font-size: 12.5px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 11.5px;
      font-weight: 600;
      background: var(--surface-2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .badge .dot { width: 5px; height: 5px; border-radius: 50%; }
    .badge.green { color: #7fe3b4; border-color: rgba(52,199,135,0.28); background: var(--accent-soft); }
    .badge.green .dot { background: var(--accent); }
    .badge.orange { color: #f2c374; border-color: rgba(232,163,61,0.28); background: var(--orange-soft); }
    .badge.orange .dot { background: var(--orange); }
    .badge.blue { color: #93bdf5; border-color: rgba(91,157,240,0.28); background: var(--blue-soft); }
    .badge.blue .dot { background: var(--blue); }

    .bottom-row {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 14px;
    }

    .empty-state {
      text-align: center;
      color: var(--text-faint);
      padding: 30px 12px;
      font-size: 13px;
    }

    .footer-note {
      margin-top: 14px;
      color: var(--text-faint);
      font-size: 11.5px;
    }

    /* ================= responsive ================= */

    @media (max-width: 1100px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .charts-row, .bottom-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        height: auto;
        flex-direction: row;
        align-items: center;
        overflow-x: auto;
        padding: 14px 16px;
      }
      .nav-group { flex-direction: row; }
      .sidebar-foot { display: none; }
      .main { padding: 20px; }
    }

    @media (max-width: 560px) {
      .kpi-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="/dashboard.jsx"></script>
</body>
</html>
